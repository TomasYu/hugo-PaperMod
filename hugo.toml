baseURL = "https://hugo-papermod-a9y.pages.dev/"
title = "Tomas's Blog"
languageCode = "zh-cn"
defaultContentLanguage = "zh"

[params]
    env = "production"
    ShowFullTextContent = false
    ShowCodeCopyButtons = true
    ShowBreadCrumbs = true
    ShowReadingTime = true
    paginate = 5

    # --- 1. 个人主页模式 ---
    [params.profileMode]
        enabled = true
        title = "Tomas's Space"
        subtitle = "专注于技术探索与生活记录"
        displayFullDisp = true
        imageUrl = "https://github.com/TomasYu.png"
        imageWidth = 120
        imageHeight = 120

    # 按钮必须紧跟在所属的 parent 后面
    [[params.profileMode.buttons]]
        name = "浏览文章"
        url = "posts"
    [[params.profileMode.buttons]]
        name = "关于我"
        url = "about"

    # --- 2. 社交图标 ---
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/TomasYu"
    [[params.socialIcons]]
        name = "twitter"
        url = "https://twitter.com/TomasYu"

# --- 3. 导航菜单 ---
[[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

# --- 4. 代码高亮 ---
[markup.highlight]
    style = "monokai"
    lineNos = true