baseURL = "https://hugo-papermod-a9y.pages.dev/"
title = "Tomas's Blog"
languageCode = "zh-cn"
defaultContentLanguage = "zh"

[params]
    env = "production"
    # 基础功能设置
    ShowFullTextContent = false
    ShowCodeCopyButtons = true
    ShowBreadCrumbs = true
    ShowReadingTime = true
    paginate = 5

    # --- 1. 个人主页模式 (Profile Mode) ---
    # 开启后首页会有一个漂亮的大头像和简介，看起来不那么“干巴”
    [params.profileMode]
        enabled = true
        title = "Tomas's Space"
        subtitle = "专注于技术探索与生活记录"
        displayFullDisp = true # 显示完整描述
        imageUrl = "https://github.com/TomasYu.png" # 自动获取你的 GitHub 头像
        imageWidth = 120
        imageHeight = 120
        [params.profileMode.buttons]
            [[params.profileMode.buttons]]
                name = "浏览文章"
                url = "posts"
            [[params.profileMode.buttons]]
                name = "关于我"
                url = "about"

    # --- 2. 社交图标 ---
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/TomasYu"
    [[params.socialIcons]]
        name = "twitter"
        url = "https://twitter.com/TomasYu"

# --- 3. 导航菜单 ---
[[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

# --- 4. 代码高亮 ---
[markup.highlight]
    style = "monokai"
    lineNos = true